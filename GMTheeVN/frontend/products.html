<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
<script src="js/data.js"></script>
<script src="js/cart.js"></script>
</head>
<body>

<div class="container">
<h2>Cửa hàng</h2>
<div class="card-container" id="plist"></div>
</div>

<script>
let p=document.getElementById("plist");

products.forEach(prod=>{
p.innerHTML+=`
<div class="card">
<img src="${prod.image}">
<h3>${prod.name}</h3>
<p>${prod.price} VND</p>
<button onclick="addToCart(${prod.id})">Mua</button>
</div>`;
});
</script>

</body>
</html>
