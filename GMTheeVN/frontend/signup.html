<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - GMTheeVN</title>
    <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Maven Pro', sans-serif;
            background: linear-gradient(135deg, #a8e6f8 0%, #b3f0ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

       
        .logo {
            position: fixed;          
            top: 20px;                
            left: 20px;               
            z-index: 100;     
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: #0052cc;
            background: white;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            font-family: 'Maven Pro', sans-serif;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .title {
            text-align: center;
            font-size: 48px;
            font-weight: 900;
            color: #000;
            margin: 40px 0;
            letter-spacing: 2px;
            font-family: 'Maven Pro', sans-serif;
        }

        .divider {
            text-align: center;
            margin-bottom: 30px;
        }

        .divider-line {
            display: inline-block;
            width: 200px;
            height: 2px;
            background: linear-gradient(to right, transparent, #d4a574, transparent);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #000;
            margin-bottom: 12px;
            font-family: 'Maven Pro', sans-serif;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(200, 180, 180, 0.4);
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Maven Pro', sans-serif;
        }

        .form-group input:focus {
            background: rgba(200, 180, 180, 0.6);
            box-shadow: 0 0 10px rgba(0, 82, 204, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(0, 0, 0, 0.3);
        }

        .btn-register {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #5555ff 0%, #4444dd 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-family: 'Maven Pro', sans-serif;
        }

        .btn-register:hover {
            background: linear-gradient(135deg, #6666ff 0%, #5555ee 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(85, 85, 255, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .decoration {
            position: fixed;
            opacity: 0.6;
            pointer-events: none;
        }

        .decoration-top {
            top: 5%;
            left: 30%;
            width: 150px;
            height: 150px;
            object-fit: cover;
        }

        .decoration-bottom {
            bottom: 1%;
            right: 30%;
            width: 150px;
            height: 150px;
            object-fit: cover;
            transform: rotate(180deg); 
        }
        /* Link đến trang đăng nhập */
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #0052cc;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            text-decoration: underline;
            color: #003a9f;
        }
    </style>
</head>
<body>
    <!-- ===== LOGO ===== -->
    <div class="logo">
        <div class="logo-text">GMTheeVN</div>
    </div>

    <!-- ===== FORM CONTAINER ===== -->
    <div class="container">
        <!-- Title -->
        <div class="title">ĐĂNG KÝ</div>

        <!-- Divider -->
        <div class="divider">
            <div class="divider-line"></div>
        </div>

        <!-- Form -->
        <form>
            <!-- Tên đăng nhập -->
            <div class="form-group">
                <label for="username">Tên đăng nhập:</label>
                <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
            </div>

            <!-- Số điện thoại -->
            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại" required>
            </div>

            <!-- Mật khẩu -->
            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>

            <!-- Xác nhận mật khẩu -->
            <div class="form-group">
                <label for="confirm-password">Xác nhận mật khẩu:</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Nhập lại mật khẩu" required>
            </div>

            <!-- Button -->
            <button type="submit" class="btn-register">Đăng ký</button>

            <!-- Link to login -->
            <div class="login-link">
                Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a>
            </div>
        </form>
    </div>

    <!-- ===== HÓA VĂN - ẢNH ===== -->
    <img src="./images/hoavan.png" class="decoration decoration-top" alt="Hoa văn">
   <img src="./images/hoavan.png" class="decoration decoration-bottom" alt="Hoa văn">

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Mật khẩu không khớp!');
            }
        });
    </script>
</body>
</html>
